<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Skills & Tools Toggle</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    /* ===== TOGGLE BAR ===== */
    .toggle {
        margin: 30px 0;
        display: flex;
        background: #020617;
        padding: 6px;
        border-radius: 40px;
        gap: 6px;
    }

    .toggle button {
        padding: 10px 22px;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        background: transparent;
        color: white;
        font-size: 15px;
        transition: all 0.3s ease;
    }

    .toggle button.active {
        background: #38bdf8;
        color: #020617;
        box-shadow: 0 0 10px rgba(56,189,248,0.6);
    }

    /* ===== GRID ===== */
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 20px;
        width: 80%;
        max-width: 800px;
    }

    .card {
        background: #020617;
        padding: 20px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 120px;
        position: relative;
        overflow: visible; /* allow popup outside card */
        transition: transform 0.3s ease;
    }

    .card:hover {
        transform: scale(1.1);
        z-index: 5;
    }

    /* IMAGE FIT PERFECTLY */
    .icon {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
    }

    /* ===== POPUP TEXT (TOP) ===== */
    .card::after {
        content: attr(data-name);
        position: absolute;
        top: -14px;                 /* position above image */
        left: 50%;
        transform: translate(-50%, -10px);
        background: rgba(56, 189, 248, 0.95);
        color: #020617;
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: bold;
        white-space: nowrap;
        opacity: 0;
        transition: all 0.25s ease;
        pointer-events: none;
    }

    .card:hover::after {
        opacity: 1;
        transform: translate(-50%, -20px);
    }

    .hidden {
        display: none;
    }
</style>
</head>

<body>

<!-- TOGGLE BUTTONS -->
<div class="toggle">
    <button class="active" onclick="showSkills()">Skills</button>
    <button onclick="showTools()">Tools</button>
    <button onclick="showAll()">All</button>
</div>

<!-- SKILLS -->
<div id="skills" class="grid">
    <div class="card" data-name="JavaScript"><img src="images/JAVA.png" class="icon"></div>
    <div class="card" data-name="Java"><img src="images/download.png" class="icon"></div>
    <div class="card" data-name="HTML"><img src="images/html.png" class="icon"></div>
    <div class="card" data-name="CSS"><img src="images/css.png" class="icon"></div>
    <div class="card" data-name="Node.js"><img src="images/NODE.JS" class="icon"></div>
    <div class="card" data-name="Express.js"><img src="images/EXPRESS.JS" class="icon"></div>
    <div class="card" data-name="MongoDB"><img src="images/MONGODB.png" class="icon"></div>
</div>

<!-- TOOLS -->
<div id="tools" class="grid hidden">
    <div class="card" data-name="VS Code"><img src="images/vscode.png" class="icon"></div>
    <div class="card" data-name="GitHub"><img src="images/GITHUB.png" class="icon"></div>
    <div class="card" data-name="Eclipse"><img src="images/ECLIPSE.png" class="icon"></div>
</div>

<script>
const skills = document.getElementById("skills");
const tools = document.getElementById("tools");

function showSkills() {
    skills.style.display = "grid";
    tools.style.display = "none";
    setActive(0);
}

function showTools() {
    skills.style.display = "none";
    tools.style.display = "grid";
    setActive(1);
}

function showAll() {
    skills.style.display = "grid";
    tools.style.display = "grid";
    setActive(2);
}

function setActive(index) {
    document.querySelectorAll(".toggle button").forEach((btn, i) => {
        btn.classList.toggle("active", i === index);
    });
}
</script>

</body>
</html>
