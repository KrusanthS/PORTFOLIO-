<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills & Tools</title>

<style>
/* ===== BODY ===== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #020617, #0f172a);
    color: white;
    min-height: 100vh;
}

/* ===== SECTION ===== */
.skill-new {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* ===== TOGGLE ===== */
.toggle {
    margin: 40px 0 30px;
    display: flex;
    background: #020617;
    padding: 8px;
    border-radius: 40px;
    gap: 8px;
}

.toggle button {
    padding: 10px 26px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    background: transparent;
    color: white;
    font-size: 15px;
    transition: all 0.3s ease;
}

.toggle button.active {
    background: #38bdf8;
    color: #020617;
    box-shadow: 0 0 15px rgba(56,189,248,0.7);
}

/* ===== HEADINGS ===== */
h2 {
    margin: 25px 0;
    font-size: 24px;
    color: #38bdf8;
    text-align: center;
    letter-spacing: 1px;
}

/* ===== GRID ===== */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 28px;
    width: 100%;
    max-width: 1100px;
    padding: 0 24px;
    margin-bottom: 50px;
    justify-items: center;
}

/* ===== CARD ===== */
.card {
    background: #020617;
    border-radius: 18px;
    width: 150px;
    height: 150px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: transform 0.35s ease, box-shadow 0.35s ease;
}

.card:hover {
    transform: scale(1.12);
    box-shadow: 0 0 25px rgba(56,189,248,0.45);
    z-index: 5;
}

/* ===== ICON ===== */
.icon {
    max-width: 80%;
    max-height: 80%;
    object-fit: contain;
}

/* ===== TOOLTIP ===== */
.card::after {
    content: attr(data-name);
    position: absolute;
    top: -16px;
    left: 50%;
    transform: translate(-50%, -10px);
    background: rgba(56, 189, 248, 0.95);
    color: #020617;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: bold;
    opacity: 0;
    transition: all 0.25s ease;
    pointer-events: none;
    white-space: nowrap;
}

.card:hover::after {
    opacity: 1;
    transform: translate(-50%, -22px);
}

/* ===== HIDDEN ===== */
.hidden {
    display: none;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 1024px) {
    .card {
        width: 135px;
        height: 135px;
    }
}

@media (max-width: 768px) {
    .grid {
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 22px;
    }

    .card {
        width: 125px;
        height: 125px;
    }
}

@media (max-width: 480px) {
    h2 {
        font-size: 21px;
    }

    .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
    }

    .card {
        width: 115px;
        height: 115px;
    }
}
</style>
</head>

<body>

<section class="skill-new">

    <!-- TOGGLE -->
    <div class="toggle">
        <button class="active" onclick="showAll(event)">All</button>
        <button onclick="showSkills(event)">Skills</button>
        <button onclick="showTools(event)">Tools</button>
    </div>

    <!-- SKILLS -->
    <h2 id="skillsHeading">Skills</h2>
    <div id="skills" class="grid">
        <div class="card" data-name="Java"><img src="images/JAVA.png" class="icon"></div>
        <div class="card" data-name="JavaScript"><img src="images/JS.png" class="icon"></div>
        <div class="card" data-name="HTML"><img src="images/html.png" class="icon"></div>
        <div class="card" data-name="CSS"><img src="images/css.png" class="icon"></div>
        <div class="card" data-name="Node.js"><img src="images/node.png" class="icon"></div>
        <div class="card" data-name="Express.js"><img src="images/express.png" class="icon"></div>
        <div class="card" data-name="MongoDB"><img src="images/mongodb.png" class="icon"></div>
    </div>

    <!-- TOOLS -->
    <h2 id="toolsHeading">Tools</h2>
    <div id="tools" class="grid">
        <div class="card" data-name="VS Code"><img src="images/vscode.png" class="icon"></div>
        <div class="card" data-name="GitHub"><img src="images/github.png" class="icon"></div>
        <div class="card" data-name="Eclipse"><img src="images/eclipse.png" class="icon"></div>
    </div>

</section>

<script>
function setActive(btn) {
    document.querySelectorAll(".toggle button")
        .forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}

function showAll(e) {
    setActive(e.target);
    skills.classList.remove("hidden");
    tools.classList.remove("hidden");
    skillsHeading.classList.remove("hidden");
    toolsHeading.classList.remove("hidden");
}

function showSkills(e) {
    setActive(e.target);
    skills.classList.remove("hidden");
    skillsHeading.classList.remove("hidden");
    tools.classList.add("hidden");
    toolsHeading.classList.add("hidden");
}

function showTools(e) {
    setActive(e.target);
    tools.classList.remove("hidden");
    toolsHeading.classList.remove("hidden");
    skills.classList.add("hidden");
    skillsHeading.classList.add("hidden");
}
</script>

</body>
</html>
