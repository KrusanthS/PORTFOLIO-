        .card:hover .imgbox img {
            transform: scale(1.1);
        }

        .content {
            padding: 20px;
            text-align: center;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: 0.4s ease-in-out 0.2s;
        }

        .card:hover .content {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .content h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .content p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .links {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .links a {
            text-decoration: none;
            color: #667eea;
            font-weight: bold;
            padding: 8px 16px;
            border: 2px solid #667eea;
            border-radius: 25px;
            transition: 0.3s;
        }

        .links a:hover {
            background: #667eea;
            color: white;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>

<body>
    <section class="portfolio">
        <h2>Projects</h2>
        <div class="container">
            <div class="card">
                <div class="imgbox">
                    <img src="https://via.placeholder.com/300x200?text=Project+1" alt="Project 1">
                </div>
                <div class="content">
                    <h3>Project 1</h3>
                    <p>A responsive e-commerce site built with React and Node.js. Features cart management and payment integration.</p>
                    <div class="links">
                        <a href="#">Live Demo</a>
                        <a href="#">GitHub</a>
                    </div>
                </div>
            </div>
            <!-- Duplicate card structure for more projects, replace images/titles/descriptions -->
            <div class="card">
                <div class="imgbox">
                    <img src="https://via.placeholder.com/300x200?text=Project+2" alt="Project 2">
                </div>
                <div class="content">
                    <h3>Project 2</h3>
                    <p>Mobile app dashboard using Vue.js and Firebase for real-time data visualization.</p>
                    <div class="links">
                        <a href="#">Live Demo</a>
                        <a href="#">GitHub</a>
                    </div>
                </div>
            </div>
            <!-- Add more cards as needed -->
        </div>
    </section>
    <script>
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('mouseenter', () => {
                // Optional: Add overlay or particle effect
                card.style.background = 'linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%)';
            });
            
            card.addEventListener('mouseleave', () => {
                card.style.background = 'white';
            });
        });
    </script>
</body>
