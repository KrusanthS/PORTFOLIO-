<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills & Tools Section</title>

<style>
/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #0b0f14;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* ===== CONTAINER ===== */
.container {
    width: 95%;
    max-width: 1200px; /* increased screen width */
    padding: 30px;
}

/* ===== TOGGLE BUTTON ===== */
.toggle {
    display: flex;
    justify-content: center;
    margin-bottom: 40px;
}

.toggle button {
    background: #2a2f36;
    border: none;
    color: #aaa;
    padding: 14px 40px;
    font-size: 18px;
    cursor: pointer;
    border-radius: 30px;
    transition: 0.3s;
}

.toggle button.active {
    background: #e5e7eb;
    color: #000;
    font-weight: bold;
}

.toggle button:first-child {
    border-top-right-radius: 0;
    border-bottom-right-radius: 0;
}

.toggle button:last-child {
    border-top-left-radius: 0;
    border-bottom-left-radius: 0;
}

/* ===== GRID ===== */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 30px; /* more spacing */
}

/* ===== CARD ===== */
.card {
    background: #121821;
    height: 160px; /* increased card size */
    border-radius: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    background: #1a2230;
}

/* ===== ICON / IMAGE ===== */
.card img {
    width: 90px;   /* increased image size */
    height: 90px;
    object-fit: contain;
}
</style>
</head>

<body>

<div class="container">

    <!-- TOGGLE -->
    <div class="toggle">
        <button class="active" onclick="showSkills()">Skills</button>
        <button onclick="showTools()">Tools</button>
    </div>

    <!-- GRID -->
    <div class="grid" id="grid">
        <!-- Skills loaded by JS -->
    </div>

</div>

<script>
/* ===== DATA ===== */
const skills = [
    "https://upload.wikimedia.org/wikipedia/commons/9/99/Unofficial_JavaScript_logo_2.svg",
    "https://upload.wikimedia.org/wikipedia/commons/1/18/Java_logo.png",
    "https://upload.wikimedia.org/wikipedia/commons/6/61/HTML5_logo_and_wordmark.svg",
    "https://upload.wikimedia.org/wikipedia/commons/6/62/CSS3_logo.svg",
    "https://upload.wikimedia.org/wikipedia/commons/2/27/PHP-logo.svg",
    "https://upload.wikimedia.org/wikipedia/commons/1/18/C_Programming_Language.svg"
];

const tools = [
    "https://upload.wikimedia.org/wikipedia/commons/9/9a/Visual_Studio_Code_1.35_icon.svg",
    "https://upload.wikimedia.org/wikipedia/commons/e/e0/Git-logo.svg",
    "https://upload.wikimedia.org/wikipedia/commons/3/33/Figma-logo.svg",
    "https://upload.wikimedia.org/wikipedia/commons/5/59/Canva_Logo.svg",
    "https://upload.wikimedia.org/wikipedia/commons/a/a7/Docker-svgrepo-com.svg",
    "https://upload.wikimedia.org/wikipedia/commons/8/82/Adobe_Photoshop_CC_icon.svg"
];

/* ===== FUNCTIONS ===== */
function loadGrid(items) {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    items.forEach(src => {
        const card = document.createElement("div");
        card.className = "card";

        const img = document.createElement("img");
        img.src = src;

        card.appendChild(img);
        grid.appendChild(card);
    });
}

function showSkills() {
    setActive(0);
    loadGrid(skills);
}

function showTools() {
    setActive(1);
    loadGrid(tools);
}

function setActive(index) {
    const buttons = document.querySelectorAll(".toggle button");
    buttons.forEach((btn, i) => {
        btn.classList.toggle("active", i === index);
    });
}

/* ===== DEFAULT LOAD ===== */
loadGrid(skills);
</script>

</body>
</html>
