<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Skills Section</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: #0b0f14;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            width: 320px;
        }

        /* Toggle Button */
        .toggle {
            display: flex;
            background: #2a2f36;
            border-radius: 30px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .toggle button {
            flex: 1;
            padding: 10px 0;
            background: transparent;
            border: none;
            color: #bbb;
            cursor: pointer;
            font-size: 14px;
        }

        .toggle button.active {
            background: #e5e5e5;
            color: #000;
            border-radius: 30px;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .card {
            background: #141922;
            border-radius: 12px;
            padding: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80px;
        }

        .card img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Toggle -->
    <div class="toggle">
        <button class="active" onclick="showSkills()">Skills</button>
        <button onclick="showTools()">Tools</button>
    </div>

    <!-- Skills -->
    <div id="skills" class="grid">
        <div class="card"><img src="images/java.png"></div>
        <div class="card"><img src="images/javascript.png"></div>
        <div class="card"><img src="images/html.png"></div>
        <div class="card"><img src="images/css.png"></div>
        <div class="card"><img src="images/react.png"></div>
        <div class="card"><img src="images/mysql.png"></div>
    </div>

    <!-- Tools -->
    <div id="tools" class="grid hidden">
        <div class="card"><img src="images/vscode.png"></div>
        <div class="card"><img src="images/git.png"></div>
        <div class="card"><img src="images/canva.png"></div>
        <div class="card"><img src="images/figma.png"></div>
        <div class="card"><img src="images/photoshop.png"></div>
        <div class="card"><img src="images/docker.png"></div>
    </div>

</div>

<script>
    const buttons = document.querySelectorAll(".toggle button");
    const skills = document.getElementById("skills");
    const tools = document.getElementById("tools");

    function showSkills() {
        skills.classList.remove("hidden");
        tools.classList.add("hidden");
        setActive(0);
    }

    function showTools() {
        tools.classList.remove("hidden");
        skills.classList.add("hidden");
        setActive(1);
    }

    function setActive(index) {
        buttons.forEach(btn => btn.classList.remove("active"));
        buttons[index].classList.add("active");
    }
</script>

</body>
</html>
